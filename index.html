*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
color:#fff;
}

.main{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

.video-wrapper{
width:100%;
height:100%;
position:relative;
}

video{
width:100vw;
height:100vh;
object-fit:contain;
background:#000;
}

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:.25s;
}

.popup-overlay.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#111;
padding:26px;
border-radius:12px;
text-align:center;
max-width:320px;
width:90%;

box-shadow:0 10px 35px rgba(0,0,0,.4);
}

.popup-box h3{
font-size:22px;
margin-bottom:10px;
}

.popup-box p{
font-size:14px;
color:#bbb;
margin-bottom:18px;
line-height:1.5;
}

.popup-btn{
background:#fa0909;
border:none;
color:#fff;
padding:14px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
font-size:16px;
text-decoration:none;
display:inline-block;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.04);}
100%{transform:scale(1);}
}

.info{
position:absolute;
top:15px;
left:15px;
background:rgba(0,0,0,.6);
padding:8px 14px;
border-radius:30px;
font-size:14px;
backdrop-filter:blur(4px);
}
